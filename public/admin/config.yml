backend:
  name: git-gateway
  branch: main

media_folder: public/images
public_folder: /images

collections:
  - name: cars
    label: Cars
    label_singular: Car
    folder: src/content/cars
    create: true
    delete: true
    format: frontmatter
    slug: "{{slug}}"
    preview_path: cars/{{slug}}
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Year, name: year, widget: number, value_type: int, min: 2000, max: 2030 }
      - { label: Monthly Price (₹), name: price, widget: number }
      - { label: Was Price (₹), name: wasPrice, widget: number, required: false }
      - { label: Brand, name: brand, widget: string }
      - { label: Model, name: model, widget: string }
      - { label: Main Image, name: image, widget: image }
      - label: Gallery
        name: gallery
        widget: list
        required: false
        field: { label: Image, name: image, widget: image }
      - {
          label: Fuel Type,
          name: fuel,
          widget: select,
          options:
            [
              { label: Petrol, value: petrol },
              { label: Diesel, value: diesel },
              { label: Electric, value: electric },
              { label: Hybrid, value: hybrid },
            ],
        }
      - {
          label: Transmission,
          name: transmission,
          widget: select,
          options:
            [
              { label: Automatic, value: auto },
              { label: Manual, value: manual },
            ],
        }
      - { label: Seats, name: seats, widget: number, value_type: int, min: 2, max: 9 }
      - { label: WhatsApp Number, name: whatsappNumber, widget: string }
      - { label: WhatsApp Message, name: whatsappText, widget: string, required: false }
      - { label: Featured, name: featured, widget: boolean, default: false, required: false }
      - { label: Display Order, name: order, widget: number, default: 0, required: false }
      - { label: Location, name: location, widget: string }
      - { label: Down Payment (Optional), name: downPayment, widget: string, required: false }
      - { label: Finance Balance (Optional), name: financeBalance, widget: string, required: false }
      - { label: Monthly EMI (Optional), name: emi, widget: string, required: false }
      - { label: Pending Loans/Dues (Optional), name: pending, widget: string, required: false }
      - {
          label: Insurance Type,
          name: insurance,
          widget: select,
          options: [ { label: Full Insurance, value: full }, { label: Third Party, value: third } ],
          default: full
        }
      - { label: Lease Period, name: leasePeriod, widget: string }
      - { label: Kilometers Driven (Kms), name: kms, widget: number, value_type: int }
      - { label: Mileage, name: mileage, widget: string }
      - { label: RC Owner Direct, name: rcOwnerDirect, widget: boolean, default: true }
      - { label: Expecting Amount (₹), name: expectingAmount, widget: number, required: false }
      - { label: Description, name: body, widget: markdown }

  - name: pages
    label: Pages
    label_singular: Page
    folder: src/content/pages
    create: false
    delete: false
    format: frontmatter
    slug: "{{slug}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Display Order, name: order, widget: number, default: 0 }
      - { label: Logo Image, name: logoImage, widget: image, required: false }
      - { label: Hero Title Line 1, name: heroTitleLine1, widget: string, required: false }
      - { label: Hero Title Line 2, name: heroTitleLine2, widget: string, required: false }
      - { label: Hero Description, name: heroDescription, widget: text, required: false }
      - { label: Body, name: body, widget: markdown, required: false }
